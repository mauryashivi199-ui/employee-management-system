replicaCount: 1
image:
  repository: 10.89.40.52:30443/ems-project/ems-app
  tag: v2
  pullPolicy: Always
service:
  type: NodePort
  port: 5000
  nodePort: 31523
mysql:
  host: mysql-service
  port: 3306
  user: root
  password: root
  database: mydb
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
probes:
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

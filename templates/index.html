<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <body class="container mt-5">

    <h1 class="text-center mb-4">Employee Management System</h1>

    <div class="card p-4">
        <h3>Add Employee</h3>

        <form>
            <input type="text" class="form-control mb-3" placeholder="Employee ID">

            <input type="text" class="form-control mb-3" placeholder="Employee Name">

            <input type="text" class="form-control mb-3" placeholder="Department">

            <button class="btn btn-primary">
                Add Employee
            </button>
        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employee System</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{display:flex;justify-content:space-between;padding:15px;background:#111;color:#fff}
button{padding:8px 12px;border:0;cursor:pointer}
.btn{background:#4f46e5;color:#fff;border-radius:6px}
.container{padding:20px}
input,select{padding:8px;margin:5px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:15px}
.card{background:#fff;padding:10px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.small{font-size:12px;color:gray}
</style>

</head>
<body>

<header>
<h2>Employee System</h2>
<button onclick="openForm()" class="btn">+ Add</button>
</header>

<div class="container">

<input id="search" placeholder="Search..." onkeyup="render()"/>
<select id="sort" onchange="render()">
<option value="name">Sort Name</option>
<option value="dept">Sort Dept</option>
</select>

<div class="grid" id="list"></div>

</div>

<!-- FORM -->
<div id="form" style="display:none;position:fixed;top:20%;left:35%;background:#fff;padding:15px;box-shadow:0 0 10px #000">
<h3>Add Employee</h3>
<input id="id" placeholder="ID"/><br/>
<input id="name" placeholder="Name"/><br/>
<input id="dept" placeholder="Dept"/><br/>
<input id="email" placeholder="Email"/><br/><br/>
<button onclick="addEmp()" class="btn">Save</button>
<button onclick="closeForm()">Close</button>
</div>

<script>
let employees = [];

function openForm(){document.getElementById("form").style.display="block"}
function closeForm(){document.getElementById("form").style.display="none"}

function addEmp(){
  employees.push({
    id: id.value,
    name: name.value,
    dept: dept.value,
    email: email.value
  });
  closeForm();
  render();
}

function deleteEmp(i){
  employees.splice(i,1);
  render();
}

function render(){
  let list = [...employees];
  let s = search.value.toLowerCase();

  list = list.filter(e =>
    e.name.toLowerCase().includes(s) ||
    e.id.toLowerCase().includes(s)
  );

  if(sort.value==="name") list.sort((a,b)=>a.name.localeCompare(b.name));
  if(sort.value==="dept") list.sort((a,b)=>a.dept.localeCompare(b.dept));

  document.getElementById("list").innerHTML =
    list.map((e,i)=>`
      <div class="card">
        <b>${e.name}</b><br/>
        <span class="small">${e.dept}</span><br/>
        <span class="small">${e.email}</span><br/>
        <button onclick="deleteEmp(${i})">Delete</button>
      </div>
    `).join("");
}

render();
</script>

</body>
</html>
